<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TradeBot Mini App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <select id="asset-select">
                <option value="" disabled selected>Выберите актив</option>
                <option value="Bitcoin">Bitcoin (BTC)</option>
                <option value="Ethereum">Ethereum (ETH)</option>
                <option value="Litecoin">Litecoin (LTC)</option>
                <option value="Solana">Solana (SOL)</option>
                <option value="Ripple">Ripple (XRP)</option>
                <option value="Cardano">Cardano (ADA)</option>
            </select>
        </header>

        <main>
            <div id="status-container">
                <p id="status-text">Выберите актив для начала работы</p>
                <div id="waiting-screen" class="hidden">
                    <p class="waiting-text">Ожидание сигнала</p>
                </div>
            </div>

            <div id="signal-container" class="hidden">
                <div class="signal-card">
                    <h2 id="signal-direction">--</h2>
                    <p id="signal-details">--</p>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
